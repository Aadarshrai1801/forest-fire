<!DOCTYPE html>
<html>
<head>
    <title>Algerian Forest Fire Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            width: 500px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: darkgreen;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
            color: red;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Algerian Forest Fire Prediction</h2>

        <form action="{{ url_for('predict') }}" method="POST">

            <input type="number" step="any" name="Temperature" placeholder="Temperature (°C)" required>
            <input type="number" step="any" name="RH" placeholder="Relative Humidity (%)" required>
            <input type="number" step="any" name="Ws" placeholder="Wind Speed (km/h)" required>
            <input type="number" step="any" name="Rain" placeholder="Rain (mm)" required>
            <input type="number" step="any" name="FFMC" placeholder="FFMC" required>
            <input type="number" step="any" name="DMC" placeholder="DMC" required>
            <input type="number" step="any" name="ISI" placeholder="ISI" required>
            <input type="number" step="any" name="Classes" placeholder="Classes" required>
            <input type="number" step="any" name="Region" placeholder="Region" required>
                 

            <button type="submit">Predict</button>
        </form>

    <h2>
        THE FWI prediction is {{result}}
    </h2>    

    </div>

</body>
</html>
